name: Go CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate Swagger
        run: swag init

      - name: Install jq
        run: sudo apt-get install -y jq
      
      - name: Debug Swagger JSON
        run: |
          echo "=== swagger.json exists? ==="
          ls -la docs/swagger.json
          echo "=== swagger.json content ==="
          cat docs/swagger.json
          echo "=== jq parse test ==="
          cat docs/swagger.json | jq -c . | head -c 200

      - name: Update Apidog Collection
        run: |
          jq -n --argjson content "$(cat docs/swagger.json | jq -c .)" \
            '{input: {content: $content}, options: {endpointOverwriteBehavior: "ALWAYS_OVERWRITE", schemaOverwriteBehavior: "OVERWRITE_EXISTING", updateFolderOfChangedEndpoint: false, prependBasePath: false}}' \
            > apidog_payload.json

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.apidog.com/v1/projects/${{ secrets.APIDOG_PROJECT_ID }}/import-openapi?locale=en-US" \
            -H "X-Apidog-Api-Version: 2024-03-28" \
            -H "Authorization: Bearer ${{ secrets.APIDOG_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary @apidog_payload.json)

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Apidog update failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/haidarr-h/backend-go:latest .

      - name: Push Docker image
        run: docker push ghcr.io/haidarr-h/backend-go:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/backend-go
            git pull origin main
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
