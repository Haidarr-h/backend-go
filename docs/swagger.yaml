basePath: /
definitions:
  controllers.AuthRequest:
    properties:
      email:
        example: haidarGaming69@gmail.com
        type: string
      password:
        example: haidarGaming123
        type: string
    type: object
  controllers.AuthResponse:
    properties:
      token:
        example: xxxxxxxxxxxxxxx...
        type: string
    type: object
  controllers.ErrorResponse:
    properties:
      error:
        example: Invalid Email or Password
        type: string
    type: object
  controllers.GoogleTokenRequest:
    properties:
      id_token:
        type: string
    required:
    - id_token
    type: object
  controllers.SignupRequest:
    properties:
      email:
        example: haidarGaming69@example.com
        type: string
      fullName:
        example: Haidar Maximus Sebastian
        maxLength: 24
        minLength: 3
        type: string
      password:
        example: haidarGaming123
        maxLength: 24
        minLength: 8
        type: string
      username:
        example: haidarsebastian99
        maxLength: 24
        minLength: 3
        type: string
    required:
    - email
    - fullName
    - password
    - username
    type: object
host: api-staging.liftlogs.my.id
info:
  contact: {}
  description: My backend API built with Go and Gin
  title: Backend Go API
  version: "1.0"
paths:
  /auth/google/mobile:
    post:
      consumes:
      - application/json
      description: Authenticate user via Google ID token (mobile flow) and return
        a JWT token
      parameters:
      - description: Google ID Token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.GoogleTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Returns JWT token and user info
          schema:
            additionalProperties: true
            type: object
        "400":
          description: id_token is required
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid Google token
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Sign in with Google
      tags:
      - auth
  /healthCheck:
    get:
      description: Perform status check to the server
      responses: {}
      summary: Check server status
  /signin:
    post:
      consumes:
      - application/json
      description: Authenticate user and return a JWT token
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.AuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      summary: Login a user
      tags:
      - auth
  /signup:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      parameters:
      - description: Signup credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
schemes:
- https
swagger: "2.0"
